<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Digital Clock</h1>
    <div class="clock">
      <div id="time">17:16:07 PM</div>
      <div id="date">25/04/2026</div>
    </div>
    <button id="toggle-btn">Switch to 24-hour format</button>
  </div>
</body>
</html>
